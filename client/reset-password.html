<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="public-styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-secondary);
        }
        .reset-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        .reset-card h2 {
            text-align: left;
            font-size: 1.8em;
            margin-bottom: 8px;
        }
        .reset-card p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .reset-error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .reset-error.hidden { display: none; }
        .reset-success {
            background: #f0fdf4;
            border: 1px solid #86efac;
            color: #16a34a;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .reset-success.hidden { display: none; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h2>Reset Password</h2>
        <p>Enter your new password below.</p>

        <div id="reset-error" class="reset-error hidden"></div>
        <div id="reset-success" class="reset-success hidden"></div>

        <form id="reset-form" onsubmit="handleReset(event)">
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="reset-password">New Password</label>
                <input type="password" id="reset-password" required placeholder="Min 8 chars, upper + lower + digit" autocomplete="new-password">
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="reset-confirm">Confirm Password</label>
                <input type="password" id="reset-confirm" required placeholder="••••••••" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" id="reset-btn" style="width: 100%;">Reset Password</button>
        </form>

        <div id="reset-done" class="hidden" style="text-align:center;padding:20px 0;">
            <p style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:12px;">Password reset successfully!</p>
            <a href="public.html" class="btn btn-primary">Go to Login</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        async function handleReset(e) {
            e.preventDefault();
            const token = new URLSearchParams(window.location.search).get('token');
            if (!token) {
                document.getElementById('reset-error').textContent = 'Invalid reset link. Please request a new one.';
                document.getElementById('reset-error').classList.remove('hidden');
                return;
            }
            const password = document.getElementById('reset-password').value;
            const confirm = document.getElementById('reset-confirm').value;
            if (password !== confirm) {
                document.getElementById('reset-error').textContent = 'Passwords do not match.';
                document.getElementById('reset-error').classList.remove('hidden');
                return;
            }
            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            btn.textContent = 'Resetting...';
            try {
                await Auth.resetPassword(token, password);
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('reset-done').classList.remove('hidden');
            } catch (err) {
                const msg = err.errors ? err.errors.map(e => e.msg).join('. ') : (err.error || 'Reset failed.');
                document.getElementById('reset-error').textContent = msg;
                document.getElementById('reset-error').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }
    </script>
</body>
</html>
