<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge — Taikai</title>
    <style>
        /* ─── Screen Styles ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f14;
            --accent: #dc2626;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .badge-wrapper {
            text-align: center;
            width: 100%;
        }

        /* Portrait card — fits on screen and prints on a half-sheet */
        .badge-card {
            width: min(320px, 90vw);
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin: 0 auto;
        }

        .badge-header {
            background: var(--accent);
            padding: 10px 16px;
            text-align: center;
        }
        .badge-header-text {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 4px;
        }

        /* Info section — name, role, tournament */
        .badge-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 12px;
            gap: 4px;
        }

        .badge-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            text-align: center;
        }
        .badge-role {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin: 6px 0 4px;
        }
        .badge-tournament {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            line-height: 1.4;
        }
        .badge-date {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }

        /* QR section — at the bottom */
        .badge-qr {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 16px 20px;
            gap: 6px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .badge-qr img {
            width: 160px;
            height: 160px;
            border-radius: 8px;
            display: block;
        }
        .badge-qr-label {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Screen-only elements */
        .screen-only {
            margin-top: 28px;
            text-align: center;
        }
        .print-btn {
            padding: 12px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .print-btn:hover { background: #b91c1c; }
        .print-hint {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .loading-msg, .error-msg {
            text-align: center;
            padding: 60px 20px;
        }
        .error-msg { color: #f87171; }

        /* ─── Print Styles ─── */
        @media print {
            @page {
                size: 3.375in 5in;
                margin: 0;
            }

            body {
                background: #fff;
                padding: 0;
                margin: 0;
                display: block;
                min-height: auto;
            }

            .screen-only { display: none !important; }

            .badge-wrapper {
                width: 100%;
                height: 100%;
            }

            .badge-card {
                width: 100%;
                height: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
                background: #fff;
                min-width: 0;
            }

            .badge-header {
                background: #dc2626 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .badge-header-text { color: #fff !important; }

            .badge-body { background: #fff; }
            .badge-name { color: #111; }
            .badge-role { color: #dc2626; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .badge-tournament { color: #555; }
            .badge-date { color: #888; }

            .badge-qr {
                background: #fff;
                border-top: 1px solid #eee;
            }
            .badge-qr-label { color: #aaa; }
            .badge-qr img {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TournamentMgr">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
    <div class="badge-wrapper" id="badge-wrapper">
        <div class="loading-msg" id="badge-loading">
            Loading badge...
        </div>
    </div>

    <div class="screen-only" id="screen-actions" style="display:none;">
        <button class="print-btn" onclick="window.print()">Print Badge</button>
        <p class="print-hint">Use Ctrl+P (or Cmd+P) to print. Set margins to "None" for best results.</p>
    </div>

    <script src="/auth.js"></script>
    <script>
    (async function() {
        'use strict';

        const wrapper = document.getElementById('badge-wrapper');
        const loading = document.getElementById('badge-loading');
        const actions = document.getElementById('screen-actions');

        const params = new URLSearchParams(window.location.search);
        const memberId = params.get('memberId');
        const registrationId = params.get('registrationId');

        if (!memberId && !registrationId) {
            loading.innerHTML = '<div class="error-msg">No badge ID specified.</div>';
            return;
        }

        // Init auth
        await Auth.init();
        if (!Auth.isLoggedIn()) {
            loading.innerHTML = '<div class="error-msg">Please log in to view your badge.</div>';
            return;
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function renderBadge(firstName, lastName, roleLabel, tournamentName, tournamentDate, qrSrc) {
            const dateStr = tournamentDate
                ? new Date(tournamentDate.length === 10 ? tournamentDate + 'T12:00:00' : tournamentDate)
                    .toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
                : '';

            wrapper.innerHTML = `
                <div class="badge-card">
                    <div class="badge-header">
                        <div class="badge-header-text">TAIKAI</div>
                    </div>
                    <div class="badge-body">
                        <div class="badge-name">${esc(firstName)} ${esc(lastName)}</div>
                        <div class="badge-role">${roleLabel}</div>
                        <div class="badge-tournament">${esc(tournamentName || '')}</div>
                        ${dateStr ? `<div class="badge-date">${dateStr}</div>` : ''}
                    </div>
                    <div class="badge-qr">
                        <img src="${qrSrc}" alt="Check-in QR code" width="160" height="160">
                        <div class="badge-qr-label">Scan to Check In</div>
                    </div>
                </div>
            `;
            actions.style.display = '';
        }

        try {
            if (memberId) {
                // ── Official / coach / judge / staff badge ──
                const res = await fetch(`/api/my/membership/${memberId}`, { credentials: 'include' });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.error || 'Failed to load badge data');
                }
                const data = await res.json();
                const m = data.member;

                if (m.status !== 'approved') {
                    loading.innerHTML = '<div class="error-msg">Badge is only available for approved members.</div>';
                    return;
                }

                const roleLabels = { coach: 'Coach', judge: 'Judge', staff: 'Staff', parent: 'Parent / Guardian' };
                renderBadge(
                    m.first_name, m.last_name,
                    roleLabels[m.role] || m.role,
                    m.tournament_name,
                    m.tournament_date,
                    `/api/my/membership/${encodeURIComponent(memberId)}/qr`
                );

            } else {
                // ── Competitor badge ──
                const res = await fetch(`/api/registrations/my/${registrationId}`, { credentials: 'include' });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.error || 'Failed to load badge data');
                }
                const data = await res.json();
                const r = data.registration;

                if (r.status === 'cancelled') {
                    loading.innerHTML = '<div class="error-msg">Badge is not available for cancelled registrations.</div>';
                    return;
                }

                renderBadge(
                    r.first_name, r.last_name,
                    'Competitor',
                    r.tournament_name,
                    r.tournament_date,
                    `/api/registrations/my/${encodeURIComponent(registrationId)}/qr`
                );
            }

        } catch (err) {
            loading.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
        }
    })();
    </script>
</body>
</html>
