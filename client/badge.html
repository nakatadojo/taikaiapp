<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge — Taikai</title>
    <style>
        /* ─── Screen Styles ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f14;
            --accent: #dc2626;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .badge-wrapper {
            text-align: center;
            width: 100%;
        }

        /* Portrait card — fits on screen and prints on a half-sheet */
        .badge-card {
            width: min(320px, 90vw);
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin: 0 auto;
        }

        .badge-header {
            background: var(--accent);
            padding: 10px 16px;
            text-align: center;
        }
        .badge-header-text {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 4px;
        }

        /* Info section — name, role, tournament */
        .badge-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 12px;
            gap: 4px;
        }

        .badge-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            text-align: center;
        }
        .badge-role {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin: 6px 0 4px;
        }
        .badge-tournament {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            line-height: 1.4;
        }
        .badge-date {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }

        /* QR section — at the bottom */
        .badge-qr {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 16px 20px;
            gap: 6px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .badge-qr canvas {
            border-radius: 8px;
            display: block;
        }
        .badge-qr-label {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Screen-only elements */
        .screen-only {
            margin-top: 28px;
            text-align: center;
        }
        .print-btn {
            padding: 12px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .print-btn:hover { background: #b91c1c; }
        .print-hint {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .loading-msg, .error-msg {
            text-align: center;
            padding: 60px 20px;
        }
        .error-msg { color: #f87171; }

        /* ─── Print Styles ─── */
        @media print {
            @page {
                size: 3.375in 5in;
                margin: 0;
            }

            body {
                background: #fff;
                padding: 0;
                margin: 0;
                display: block;
                min-height: auto;
            }

            .screen-only { display: none !important; }

            .badge-wrapper {
                width: 100%;
                height: 100%;
            }

            .badge-card {
                width: 100%;
                height: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
                background: #fff;
                min-width: 0;
            }

            .badge-header {
                background: #dc2626 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .badge-header-text { color: #fff !important; }

            .badge-body { background: #fff; }
            .badge-name { color: #111; }
            .badge-role { color: #dc2626; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .badge-tournament { color: #555; }
            .badge-date { color: #888; }

            .badge-qr {
                background: #fff;
                border-top: 1px solid #eee;
            }
            .badge-qr-label { color: #aaa; }
            .badge-qr canvas {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="badge-wrapper" id="badge-wrapper">
        <div class="loading-msg" id="badge-loading">
            Loading badge...
        </div>
    </div>

    <div class="screen-only" id="screen-actions" style="display:none;">
        <button class="print-btn" onclick="window.print()">Print Badge</button>
        <p class="print-hint">Use Ctrl+P (or Cmd+P) to print. Set margins to "None" for best results.</p>
    </div>

    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="/auth.js"></script>
    <script>
    (async function() {
        'use strict';

        const wrapper = document.getElementById('badge-wrapper');
        const loading = document.getElementById('badge-loading');
        const actions = document.getElementById('screen-actions');

        // Get member ID from URL
        const params = new URLSearchParams(window.location.search);
        const memberId = params.get('memberId');

        if (!memberId) {
            loading.innerHTML = '<div class="error-msg">No badge ID specified.</div>';
            return;
        }

        // Init auth
        await Auth.init();
        if (!Auth.isLoggedIn()) {
            loading.innerHTML = '<div class="error-msg">Please log in to view your badge.</div>';
            return;
        }

        // Fetch member data
        try {
            const res = await fetch(`/api/my/membership/${memberId}`, { credentials: 'include' });
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.error || 'Failed to load badge data');
            }
            const data = await res.json();
            const m = data.member;

            if (m.status !== 'approved') {
                loading.innerHTML = '<div class="error-msg">Badge is only available for approved members.</div>';
                return;
            }

            const roleLabels = { coach: 'Coach', judge: 'Judge', staff: 'Staff', parent: 'Parent / Guardian' };
            const roleLabel = roleLabels[m.role] || m.role;

            const dateStr = m.tournament_date
                ? new Date(m.tournament_date.length === 10 ? m.tournament_date + 'T12:00:00' : m.tournament_date)
                    .toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
                : '';

            wrapper.innerHTML = `
                <div class="badge-card">
                    <div class="badge-header">
                        <div class="badge-header-text">TAIKAI</div>
                    </div>
                    <div class="badge-body">
                        <div class="badge-name">${esc(m.first_name)} ${esc(m.last_name)}</div>
                        <div class="badge-role">${roleLabel}</div>
                        <div class="badge-tournament">${esc(m.tournament_name || '')}</div>
                        ${dateStr ? `<div class="badge-date">${dateStr}</div>` : ''}
                    </div>
                    <div class="badge-qr">
                        <canvas id="badge-qr-canvas"></canvas>
                        <div class="badge-qr-label">Scan to Check In</div>
                    </div>
                </div>
            `;

            // Generate QR code encoding the member check-in URL
            const checkInUrl = `${window.location.origin}/checkin?memberId=${encodeURIComponent(memberId)}`;
            await QRCode.toCanvas(document.getElementById('badge-qr-canvas'), checkInUrl, {
                width: 160,
                margin: 1,
                color: { dark: '#000000', light: '#ffffff' }
            });

            actions.style.display = '';

        } catch (err) {
            loading.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    })();
    </script>
</body>
</html>
