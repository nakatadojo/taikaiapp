<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Tournament Manager</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .icon {
      width: 96px;
      height: 96px;
      background: #1e293b;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      border: 2px solid #334155;
    }
    .icon svg { width: 48px; height: 48px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
      text-align: center;
    }
    p {
      font-size: 16px;
      color: #94a3b8;
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .status {
      margin-top: 24px;
      font-size: 13px;
      color: #475569;
    }
    .status.online { color: #22c55e; }
  </style>
</head>
<body>
  <div class="icon">
    <!-- WiFi-off icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>
    No internet connection detected. Check your connection and try again.
    Some features may still be available from the cache.
  </p>

  <button class="btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Try again
  </button>

  <p class="status" id="status"></p>

  <script>
    function updateStatus() {
      const el = document.getElementById('status');
      if (navigator.onLine) {
        el.textContent = 'Connection restored — ';
        el.className = 'status online';
        const link = document.createElement('a');
        link.href = '/';
        link.style.color = 'inherit';
        link.textContent = 'go to app';
        el.appendChild(link);
      } else {
        el.textContent = 'Still offline';
        el.className = 'status';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
