<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Display - Karate Tournament</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Hide ALL buttons */
        button,
        .btn {
            display: none !important;
        }

        .tv-container {
            max-width: 1800px;
            margin: 0 auto;
        }

        .tv-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tv-header h1 {
            font-size: 3em;
            margin: 0 0 10px 0;
        }

        /* ─── Kata full-screen TV mode ─── */
        html.kata-tv-mode,
        html.kata-tv-mode body {
            height: 100%;
            overflow: hidden;
        }
        html.kata-tv-mode body {
            padding: 0;
            margin: 0;
            background: #0f0f14;
        }
        html.kata-tv-mode .tv-container {
            max-width: none;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        html.kata-tv-mode .tv-header {
            display: none;
        }
        html.kata-tv-mode #tv-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <div class="tv-header">
            <h1 id="tv-title">Mat 1 - Division (Kata Flags)</h1>
        </div>

        <div id="tv-content">
            <!-- Content will be injected here matching operator exactly -->
        </div>
    </div>

    <script>
        // Receive state updates from operator tab via BroadcastChannel (zero localStorage)
        const _bc = (() => { try { return new BroadcastChannel('taikai-display'); } catch(e) { return null; } })();
        if (_bc) {
            _bc.onmessage = (evt) => {
                const d = evt.data;
                if (!d) return;
                if (d.type === 'table-update' && d.table === 'scoreboard-state' && d.value) {
                    try { updateDisplay(JSON.parse(d.value)); } catch(e) {}
                } else if (d.type === 'state-snapshot' && d['scoreboard-state']) {
                    try { updateDisplay(JSON.parse(d['scoreboard-state'])); } catch(e) {}
                }
            };
            // Request current state from any open operator tab
            try { _bc.postMessage({ type: 'request-state' }); } catch(e) {}
        }

        // Returns white for dark backgrounds, black for light backgrounds
        function getCornerTextColor(bgColor) {
            if (!bgColor) return '#ffffff';
            const hex = bgColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.6 ? '#000000' : '#ffffff';
        }

        function updateDisplay(state) {
            if (!state) return;

            console.log('TV Display updating with state:', state);

            // Toggle full-screen kata layout (removes body padding, hides title h1)
            document.documentElement.classList.toggle('kata-tv-mode', state.scoreboardType === 'kata');

            // Update title
            const title = document.getElementById('tv-title');
            const typeLabel = state.scoreboardType === 'kata-flags' ? 'Kata Flags' : state.scoreboardType === 'kata' ? 'Kata' : 'Kumite';
            title.textContent = `${state.matName || 'Mat 1'} - ${state.divisionName || 'Division'} (${typeLabel})`;

            // Get content container
            const content = document.getElementById('tv-content');

            if (state.scoreboardType === 'kata-flags') {
                const c1 = state.corner1Color || '#ff3b30';
                const c2 = state.corner2Color || '#0a84ff';
                const c1Text = getCornerTextColor(c1);
                const c2Text = getCornerTextColor(c2);
                // EXACT copy of operator HTML structure for kata-flags
                content.innerHTML = `
                    <div class="operator-scoreboard" style="max-height: 90vh; overflow-y: auto;">
                        <div class="glass-panel" style="margin-bottom: 20px; text-align: center;">
                            <h4 style="margin-bottom: 8px;">Current Match</h4>
                            <p style="color: var(--text-secondary);">${state.matchInfo || 'Round 1 - Match 1'}</p>
                            <p style="color: var(--text-secondary); font-size: 12px; margin-top: 8px;">Judges vote with flags for the better performance</p>
                        </div>

                        <!-- Competitors Display -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <!-- Corner 1 -->
                            <div class="glass-panel" style="background: ${c1}; border-color: ${c1}; color: ${c1Text}; padding: 20px; text-align: center;">
                                <div style="font-size: 16px; font-weight: 600; color: ${c1Text}; margin-bottom: 8px;">${state.corner1Name || 'Red'}</div>
                                ${state.redPhoto ? `
                                    <div style="margin-bottom: 12px;">
                                        <img src="${state.redPhoto}" alt="${state.redName}"
                                             style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid ${c1Text}33; box-shadow: 0 6px 16px rgba(0,0,0,0.4);">
                                    </div>
                                ` : ''}
                                <div style="font-size: 24px; font-weight: 700; color: ${c1Text}; margin-bottom: 8px;">${state.redName || 'Competitor 1'}</div>
                                <div style="font-size: 12px; color: ${c1Text}; opacity: 0.8;">
                                    ${state.redInfo ? state.redInfo.split('\\n').map((line, idx) =>
                                        idx === 1 && state.redClubLogo ?
                                        `<div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;">
                                            <img src="${state.redClubLogo}" alt="Club Logo" style="width: 24px; height: 24px; object-fit: contain; border-radius: 4px;">
                                            <span>${line}</span>
                                        </div>` :
                                        `<div>${line}</div>`
                                    ).join('') : ''}
                                </div>
                                <div style="font-size: 48px; font-weight: 700; color: ${c1Text}; margin-top: 16px;">${state.redFlags || 0}</div>
                                <div style="font-size: 12px; color: ${c1Text}; opacity: 0.7;">Flags</div>
                            </div>

                            <!-- Corner 2 -->
                            <div class="glass-panel" style="background: ${c2}; border-color: ${c2}; color: ${c2Text}; padding: 20px; text-align: center;">
                                <div style="font-size: 16px; font-weight: 600; color: ${c2Text}; margin-bottom: 8px;">${state.corner2Name || 'Blue'}</div>
                                ${state.bluePhoto ? `
                                    <div style="margin-bottom: 12px;">
                                        <img src="${state.bluePhoto}" alt="${state.blueName}"
                                             style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid ${c2Text}33; box-shadow: 0 6px 16px rgba(0,0,0,0.4);">
                                    </div>
                                ` : ''}
                                <div style="font-size: 24px; font-weight: 700; color: ${c2Text}; margin-bottom: 8px;">${state.blueName || 'Competitor 2'}</div>
                                <div style="font-size: 12px; color: ${c2Text}; opacity: 0.8;">
                                    ${state.blueInfo ? state.blueInfo.split('\\n').map((line, idx) =>
                                        idx === 1 && state.blueClubLogo ?
                                        `<div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;">
                                            <img src="${state.blueClubLogo}" alt="Club Logo" style="width: 24px; height: 24px; object-fit: contain; border-radius: 4px;">
                                            <span>${line}</span>
                                        </div>` :
                                        `<div>${line}</div>`
                                    ).join('') : ''}
                                </div>
                                <div style="font-size: 48px; font-weight: 700; color: ${c2Text}; margin-top: 16px;">${state.blueFlags || 0}</div>
                                <div style="font-size: 12px; color: ${c2Text}; opacity: 0.7;">Flags</div>
                            </div>
                        </div>

                        <!-- Judge Panel -->
                        <div class="glass-panel" style="padding: 20px;">
                            <h4 style="text-align: center; margin-bottom: 20px;">Judge Panel (${state.judges || 5} Judges)</h4>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                                ${Array.from({ length: state.judges || 5 }, (_, i) => {
                                    const vote = state.judgeVotes?.[i];
                                    const voteText = vote === 'corner1' ? state.corner1Name : vote === 'corner2' ? state.corner2Name : 'No vote';
                                    return `
                                        <div class="glass-panel" style="padding: 16px; text-align: center; background: var(--bg-secondary);">
                                            <div style="font-weight: 600; margin-bottom: 12px;">Judge ${i + 1}</div>
                                            <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; min-height: 20px;">${voteText}</div>
                                            <div style="display: flex; gap: 8px; justify-content: center;">
                                                <button class="btn btn-small" data-judge="${i}" data-corner="corner1" style="background: ${state.corner1Color || '#ff3b30'}; flex: 1;">
                                                    ${state.corner1Name || 'Red'} Flag
                                                </button>
                                                <button class="btn btn-small" data-judge="${i}" data-corner="corner2" style="background: ${state.corner2Color || '#0a84ff'}; flex: 1;">
                                                    ${state.corner2Name || 'Blue'} Flag
                                                </button>
                                            </div>
                                            <button class="btn btn-small btn-secondary" data-judge="${i}" data-corner="clear" style="margin-top: 8px; width: 100%; font-size: 11px;">Clear</button>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Match Control (buttons will be hidden by CSS) -->
                        <div class="glass-panel" style="text-align: center; padding: 20px; margin-top: 20px;">
                            <h4 style="margin-bottom: 16px;">Match Control</h4>
                            <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                                <button class="btn btn-primary" style="font-size: 14px; padding: 10px 20px;">
                                    📺 Open TV Display
                                </button>
                                <button class="btn btn-primary" style="font-size: 16px; padding: 12px 24px;">
                                    ✓ Declare Winner (Based on Flags)
                                </button>
                                <button class="btn btn-secondary">
                                    Reset All Votes
                                </button>
                            </div>
                            <div style="margin-top: 16px; font-size: 14px; color: var(--text-secondary);"></div>
                        </div>
                    </div>
                `;
            } else if (state.scoreboardType === 'kumite') {
                const c1 = state.corner1Color || '#ff453a';
                const c2 = state.corner2Color || '#0a84ff';
                const c1Text = getCornerTextColor(c1);
                const c2Text = getCornerTextColor(c2);
                // Kumite display with photos and logos
                content.innerHTML = `
                    <div class="operator-scoreboard" style="max-height: 90vh; overflow-y: auto;">
                        <div class="glass-panel" style="margin-bottom: 20px; text-align: center;">
                            <h4 style="margin-bottom: 8px;">Current Match</h4>
                            <p style="color: var(--text-secondary);">${state.matchInfo || 'Current Match'}</p>
                        </div>

                        <div class="scoreboard-display" style="display: grid; grid-template-columns: 1fr auto 1fr; gap: clamp(15px, 3vw, 40px); margin-bottom: 20px;">
                            <!-- Corner 1 Side -->
                            <div class="glass-panel" style="background: ${c1}; border-color: ${c1}; color: ${c1Text}; padding: clamp(16px, 2.5vw, 24px);">
                                <div style="text-align: center;">
                                    <div style="font-size: clamp(16px, 1.8vw, 20px); font-weight: 600; color: ${c1Text}; margin-bottom: 8px;">${state.corner1Name || 'RED'}</div>
                                    ${state.redPhoto ? `
                                        <div style="margin-bottom: 12px;">
                                            <img src="${state.redPhoto}" alt="${state.redName}"
                                                 style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid ${c1Text}33; box-shadow: 0 6px 16px rgba(0,0,0,0.4);">
                                        </div>
                                    ` : ''}
                                    <div style="font-size: clamp(18px, 2.5vw, 28px); font-weight: 700; color: ${c1Text}; margin-bottom: 10px; word-wrap: break-word;">${state.redName || 'NO COMPETITOR'}</div>
                                    ${state.redInfo ? `
                                        <div style="font-size: clamp(12px, 1.3vw, 16px); color: ${c1Text}; opacity: 0.8; margin-bottom: 12px;">
                                            ${state.redInfo.split('|').slice(0, 3).join(' | ')}<br>
                                            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;">
                                                ${state.redClubLogo ? `<img src="${state.redClubLogo}" alt="Club Logo" style="width: 24px; height: 24px; object-fit: contain; border-radius: 4px;">` : ''}
                                                <span>${state.redInfo.split('|').slice(3).join('').trim()}</span>
                                            </div>
                                        </div>
                                    ` : ''}
                                    <div style="font-size: clamp(56px, 7vw, 84px); font-weight: 700; color: ${c1Text}; margin: 16px 0;">${state.redScore || 0}</div>
                                    <div style="font-size: clamp(12px, 1.3vw, 16px); color: ${c1Text}; opacity: 0.8;">Penalties: ${state.redPenalties || 0}</div>
                                </div>
                            </div>

                            <!-- Timer & Controls -->
                            <div class="glass-panel" style="min-width: clamp(160px, 18vw, 220px); padding: clamp(16px, 2.5vw, 24px);">
                                <div style="text-align: center;">
                                    <div style="font-size: clamp(12px, 1.3vw, 16px); color: var(--text-secondary); margin-bottom: 8px;">TIME</div>
                                    <div style="font-size: clamp(42px, 5vw, 56px); font-weight: 700; margin-bottom: 20px;">${state.timer || '2:00'}</div>
                                </div>
                            </div>

                            <!-- Corner 2 Side -->
                            <div class="glass-panel" style="background: ${c2}; border-color: ${c2}; color: ${c2Text}; padding: clamp(16px, 2.5vw, 24px);">
                                <div style="text-align: center;">
                                    <div style="font-size: clamp(16px, 1.8vw, 20px); font-weight: 600; color: ${c2Text}; margin-bottom: 8px;">${state.corner2Name || 'BLUE'}</div>
                                    ${state.bluePhoto ? `
                                        <div style="margin-bottom: 12px;">
                                            <img src="${state.bluePhoto}" alt="${state.blueName}"
                                                 style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid ${c2Text}33; box-shadow: 0 6px 16px rgba(0,0,0,0.4);">
                                        </div>
                                    ` : ''}
                                    <div style="font-size: clamp(18px, 2.5vw, 28px); font-weight: 700; color: ${c2Text}; margin-bottom: 10px; word-wrap: break-word;">${state.blueName || 'NO COMPETITOR'}</div>
                                    ${state.blueInfo ? `
                                        <div style="font-size: clamp(12px, 1.3vw, 16px); color: ${c2Text}; opacity: 0.8; margin-bottom: 12px;">
                                            ${state.blueInfo.split('|').slice(0, 3).join(' | ')}<br>
                                            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;">
                                                ${state.blueClubLogo ? `<img src="${state.blueClubLogo}" alt="Club Logo" style="width: 24px; height: 24px; object-fit: contain; border-radius: 4px;">` : ''}
                                                <span>${state.blueInfo.split('|').slice(3).join('').trim()}</span>
                                            </div>
                                        </div>
                                    ` : ''}
                                    <div style="font-size: clamp(56px, 7vw, 84px); font-weight: 700; color: ${c2Text}; margin: 16px 0;">${state.blueScore || 0}</div>
                                    <div style="font-size: clamp(12px, 1.3vw, 16px); color: ${c2Text}; opacity: 0.8;">Penalties: ${state.bluePenalties || 0}</div>
                                </div>
                            </div>
                        </div>

                        ${state.nextDivision ? `
                            <div class="glass-panel" style="margin-top: 20px; padding: 20px; background: rgba(255, 149, 0, 0.15); border-color: rgba(255, 149, 0, 0.4); border-width: 2px;">
                                <h4 style="margin-bottom: 16px; font-size: clamp(18px, 2vw, 24px); color: #ff9500; text-align: center;">🏆 UP NEXT</h4>
                                <div style="text-align: center;">
                                    <div style="font-weight: 700; font-size: clamp(20px, 2.5vw, 28px); color: var(--text-primary); margin-bottom: 8px;">${state.nextDivision.division}</div>
                                    <div style="font-weight: 600; font-size: clamp(16px, 1.8vw, 20px); color: #ff9500; margin-bottom: 12px;">${state.nextDivision.eventName}</div>
                                    <div style="font-size: clamp(14px, 1.5vw, 18px); color: var(--text-secondary);">
                                        ${state.nextDivision.competitorCount} competitors • ${state.nextDivision.completedMatches || 0}/${state.nextDivision.totalMatches || 0} matches complete
                                    </div>
                                    ${(state.nextDivision.estimatedStartTime || state.nextDivision.time) ? `<div style="font-size: clamp(12px, 1.3vw, 16px); color: var(--text-tertiary); margin-top: 8px;">Est: ${state.nextDivision.estimatedStartTime || state.nextDivision.time}</div>` : ''}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (state.scoreboardType === 'kata') {
                // Kata / Ranking List individual scoring display
                const entries = state.rankings || [];
                const judgeScores = state.judgeScores || [];
                const numJudges = state.numJudges || 5;
                const enteredScores = judgeScores.filter(s => s !== null && s !== undefined);

                // ── Kata: full-screen broadcast layout ──
                const isSubmitted = state.status === 'submitted';
                const showScores = isSubmitted;

                let minScore = null, maxScore = null;
                if (showScores && enteredScores.length >= 3) {
                    minScore = Math.min(...enteredScores);
                    maxScore = Math.max(...enteredScores);
                }

                if (state.status === 'complete') {
                    // ── Division Complete — full-screen rankings ──
                    content.innerHTML = `
                        <div style="display:flex;flex-direction:column;height:100%;background:#0e0e10;color:white;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;align-items:center;justify-content:center;padding:40px 60px;box-sizing:border-box;">
                            <div style="font-size:clamp(28px,4.5vw,52px);font-weight:700;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;letter-spacing:-1px;">DIVISION COMPLETE</div>
                            <div style="font-size:clamp(16px,2vw,26px);color:rgba(255,255,255,0.48);margin-bottom:36px;">${state.divisionName || ''}</div>
                            <div style="width:100%;max-width:960px;">
                                ${entries.map((entry, idx) => {
                                    const medalColors = ['#FFD700','#C0C0C0','#CD7F32'];
                                    const color = idx < 3 ? medalColors[idx] : 'rgba(255,255,255,0.5)';
                                    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
                                    return `
                                        <div style="display:grid;grid-template-columns:80px 1fr 1fr 120px;align-items:center;padding:14px 24px;border-bottom:1px solid rgba(84,84,88,0.2);${idx < 3 ? 'background:rgba(255,215,0,0.04);' : ''}">
                                            <div style="font-weight:700;color:${color};font-size:clamp(16px,1.8vw,22px);">${medal || '#'+entry.rank}</div>
                                            <div style="font-weight:600;font-size:clamp(14px,1.6vw,20px);">${entry.name}</div>
                                            <div style="color:rgba(255,255,255,0.5);font-size:clamp(12px,1.3vw,16px);">${entry.club || ''}</div>
                                            <div style="font-weight:700;color:${color};font-size:clamp(14px,1.6vw,20px);text-align:right;">${entry.score.toFixed(2)}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    // ── Active Scoring — full-screen broadcast layout ──
                    const matLabel = state.matName || 'Tatami 1';
                    const divLabel = state.divisionName || 'Division';
                    const eventLabel = state.eventName ? ` · ${state.eventName}` : '';
                    const countLabel = `${state.competitorNumber || 1} / ${state.totalCompetitors || '?'}`;

                    // Competitor section HTML
                    const hasPhoto = !!state.competitorPhoto;
                    let clubHTML = '';
                    if (state.competitorClub) {
                        const logoImg = state.competitorClubLogo
                            ? `<img src="${state.competitorClubLogo}" style="width:28px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0;" alt="">`
                            : '';
                        clubHTML = `<div style="display:flex;align-items:center;gap:10px;margin-top:10px;font-size:clamp(20px,2.5vw,34px);color:rgba(255,255,255,0.48);font-weight:500;">${logoImg}<span>${state.competitorClub}</span></div>`;
                    }

                    const competitorHTML = hasPhoto ? `
                        <div style="display:flex;align-items:center;gap:32px;">
                            <img src="${state.competitorPhoto}" style="width:clamp(90px,9vw,130px);height:clamp(90px,9vw,130px);border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.14);box-shadow:0 4px 24px rgba(0,0,0,0.55);flex-shrink:0;" alt="">
                            <div style="min-width:0;overflow:hidden;">
                                <div style="font-size:clamp(64px,9vw,116px);font-weight:700;color:white;line-height:0.95;letter-spacing:-4px;text-transform:uppercase;word-wrap:break-word;overflow-wrap:break-word;">${state.competitorName || 'AWAITING'}</div>
                                ${clubHTML}
                            </div>
                        </div>
                    ` : `
                        <div style="text-align:center;">
                            <div style="font-size:clamp(80px,11vw,136px);font-weight:700;color:white;line-height:0.95;letter-spacing:-5px;text-transform:uppercase;word-wrap:break-word;">${state.competitorName || 'AWAITING'}</div>
                            ${clubHTML}
                        </div>
                    `;

                    // Judge cards HTML
                    let judgesHTML = '';
                    for (let i = 0; i < numJudges; i++) {
                        const score = judgeScores[i];
                        const hasScore = score !== null && score !== undefined;
                        let border = '1.5px solid rgba(84,84,88,0.28)';
                        let scoreColor = 'rgba(255,255,255,0.18)';
                        let glow = '';
                        if (showScores && hasScore) {
                            scoreColor = 'white';
                            if (enteredScores.length >= 3) {
                                if (score === maxScore && maxScore !== minScore) {
                                    border = '1.5px solid rgba(50,215,75,0.5)';
                                    scoreColor = '#32d74b';
                                    glow = 'box-shadow:0 0 24px rgba(50,215,75,0.18);';
                                } else if (score === minScore && maxScore !== minScore) {
                                    border = '1.5px solid rgba(255,69,58,0.4)';
                                    scoreColor = '#ff453a';
                                }
                            }
                        }
                        const scoreText = showScores && hasScore ? score.toFixed(1) : '—';
                        judgesHTML += `
                            <div style="flex:1;max-width:200px;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(24,24,26,0.92);border:${border};border-radius:16px;${glow}padding:12px 8px;">
                                <div style="font-size:clamp(13px,1.5vw,20px);color:rgba(255,255,255,0.26);font-weight:600;letter-spacing:1px;margin-bottom:8px;">J${i + 1}</div>
                                <div style="font-size:clamp(34px,4.5vw,58px);font-weight:700;color:${scoreColor};line-height:1;">${scoreText}</div>
                            </div>
                        `;
                    }

                    // Total bar
                    const totalShown = showScores && enteredScores.length > 0;
                    const totalVal = totalShown ? (state.totalScore || 0).toFixed(1) : '—';
                    const avgVal = totalShown ? (state.avgScore || 0).toFixed(2) : '—';
                    const totalBg = totalShown ? 'rgba(50,215,75,0.08)' : 'rgba(30,30,32,0.85)';
                    const totalBorderColor = totalShown ? 'rgba(50,215,75,0.2)' : 'rgba(84,84,88,0.18)';

                    // Next bar
                    let nextNameText = '—';
                    let nextClubHTML = '';
                    if (state.isLastCompetitor) {
                        nextNameText = 'FINAL COMPETITOR';
                    } else if (state.nextCompetitorName) {
                        nextNameText = state.nextCompetitorName;
                        if (state.nextCompetitorInfo) {
                            nextClubHTML = `<span style="font-size:16px;color:rgba(255,255,255,0.16);flex-shrink:0;">|</span><span style="font-size:16px;color:rgba(255,255,255,0.34);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${state.nextCompetitorInfo}</span>`;
                        }
                    }

                    content.innerHTML = `
                        <div style="display:flex;flex-direction:column;height:100%;background:#0e0e10;color:white;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">

                            <!-- Header bar: slim, centered -->
                            <div style="display:flex;align-items:center;justify-content:center;height:46px;padding:0 40px;background:rgba(14,14,16,0.97);border-bottom:1px solid rgba(84,84,88,0.18);flex-shrink:0;position:relative;">
                                <span style="font-size:clamp(14px,1.6vw,22px);font-weight:500;color:rgba(255,255,255,0.48);">${matLabel} — ${divLabel}${eventLabel}</span>
                                <span style="position:absolute;right:40px;font-size:15px;color:rgba(255,255,255,0.22);">${countLabel}</span>
                            </div>

                            <!-- Competitor: photo left, huge name right -->
                            <div style="flex-shrink:0;padding:18px 60px;">
                                ${competitorHTML}
                            </div>

                            <!-- Judge cards: fills all remaining vertical space -->
                            <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:clamp(10px,1.5vw,20px);padding:0 60px;min-height:0;">
                                ${judgesHTML}
                            </div>

                            <!-- Total score bar: compact -->
                            <div style="display:flex;justify-content:space-between;align-items:center;margin:0 60px 8px;padding:12px 32px;background:${totalBg};border:1px solid ${totalBorderColor};border-radius:12px;flex-shrink:0;">
                                <div style="display:flex;align-items:baseline;gap:14px;">
                                    <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:3px;">TOTAL SCORE</span>
                                    <span style="font-size:clamp(26px,3.5vw,48px);font-weight:700;color:white;line-height:1;">${totalVal}</span>
                                </div>
                                <div style="display:flex;align-items:baseline;gap:10px;">
                                    <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:3px;">AVG</span>
                                    <span style="font-size:clamp(20px,2.8vw,36px);font-weight:600;color:rgba(255,255,255,0.72);line-height:1;">${avgVal}</span>
                                </div>
                            </div>

                            <!-- Next competitor bar: dark footer -->
                            <div style="display:flex;align-items:center;gap:14px;padding:10px 40px;background:rgba(14,14,16,0.82);border-top:1px solid rgba(84,84,88,0.14);flex-shrink:0;overflow:hidden;">
                                <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.22);text-transform:uppercase;letter-spacing:3px;flex-shrink:0;">NEXT:</span>
                                <span style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.72);flex-shrink:0;">${nextNameText}</span>
                                ${nextClubHTML}
                            </div>
                        </div>
                    `;
                }
            } else {
                // Unknown scoreboard type
                content.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <p>Unknown scoreboard type: ${state.scoreboardType || 'none'}</p>
                    </div>
                `;
            }

            // Handle winner overlay if present
            if (state.winner) {
                showWinnerOverlay(state.winner);
            }
        }

        function showWinnerOverlay(winnerName) {
            // Create or show winner overlay
            let overlay = document.getElementById('winner-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'winner-overlay';
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100vw;
                    height: 100vh;
                    background: rgba(0, 0, 0, 0.95);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 10000;
                `;
                overlay.innerHTML = `
                    <div style="text-align: center; color: white;">
                        <h1 style="font-size: 6em; margin: 0 0 20px 0; color: #32d74b;">🏆 WINNER 🏆</h1>
                        <div style="font-size: 4em; font-weight: bold;">${winnerName}</div>
                    </div>
                `;
                document.body.appendChild(overlay);
            }
            overlay.style.display = 'flex';
        }

        // Auto-enter fullscreen on load
        window.addEventListener('load', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen failed, use F11 or click anywhere');
                });
            }
        });

        // Click anywhere to enter fullscreen
        document.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
