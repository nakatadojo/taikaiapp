<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events — Taikai</title>
    <style>
        /* ─── Reset & Variables ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f14;
            --bg-secondary: #1a1a24;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --text-dim: rgba(255,255,255,0.35);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.08);
            --glass-hover: rgba(255,255,255,0.1);
            --radius: 14px;
            --radius-sm: 10px;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a855f7;
            --yellow: #eab308;
            --pink: #ec4899;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }

        /* ─── Navbar ─── */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(15,15,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand { font-size: 22px; font-weight: 800; letter-spacing: 3px; color: var(--accent); }
        .navbar-actions { display: flex; align-items: center; gap: 12px; }
        .nav-link {
            color: var(--text-muted); font-size: 14px; font-weight: 500;
            padding: 8px 14px; border-radius: 8px; transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text); background: var(--glass); }
        .nav-link.active { color: var(--text); background: var(--glass); }
        .nav-btn {
            padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s;
        }
        .nav-btn-ghost { background: transparent; color: var(--text-muted); }
        .nav-btn-ghost:hover { color: var(--text); background: var(--glass); }

        /* ─── Page Content ─── */
        .page { padding: 96px 32px 48px; max-width: 900px; margin: 0 auto; }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

        /* ─── Loading / Empty ─── */
        .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--glass-border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center; padding: 60px 20px;
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: var(--radius); color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .empty-state-text { font-size: 14px; line-height: 1.6; }
        .empty-state a { color: var(--accent); text-decoration: underline; }

        /* ─── Event Cards ─── */
        .event-list { display: flex; flex-direction: column; gap: 14px; }
        .event-card {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 20px 24px;
            transition: all 0.2s;
        }
        .event-card:hover { border-color: rgba(255,255,255,0.15); }
        .event-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
        .event-card-info { flex: 1; min-width: 200px; }
        .event-card-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .event-card-meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }
        .event-card-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .event-card-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

        /* ─── Badges ─── */
        .badge {
            display: inline-flex; align-items: center; padding: 3px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .badge-competitor { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .badge-coach { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-judge { background: rgba(168,85,247,0.15); color: #c084fc; }
        .badge-staff { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .badge-parent { background: rgba(236,72,153,0.15); color: #f472b6; }
        .badge-director { background: rgba(220,38,38,0.15); color: #f87171; }
        .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .badge-approved { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-declined { background: rgba(239,68,68,0.15); color: #f87171; }
        .badge-active { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-confirmed { background: rgba(34,197,94,0.15); color: #4ade80; }

        /* ─── Buttons ─── */
        .btn-sm {
            padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.15s;
            background: var(--glass); color: var(--text-muted);
        }
        .btn-sm:hover { background: var(--glass-hover); color: var(--text); }
        .btn-accent { background: rgba(220,38,38,0.15); color: var(--accent); }
        .btn-accent:hover { background: rgba(220,38,38,0.25); }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .navbar { padding: 0 16px; }
            .page { padding: 80px 16px 32px; }
            .event-card { padding: 16px; }
            .event-card-header { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/" class="navbar-brand">TAIKAI</a>
    <div class="navbar-actions" id="navbar-actions"></div>
</nav>

<!-- Page -->
<main class="page">
    <h1 class="page-title">My Events</h1>
    <p class="page-subtitle">All your tournament registrations and role memberships in one place.</p>
    <div id="event-list" class="event-list">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading your events...</div>
        </div>
    </div>
</main>

<script src="/auth.js"></script>
<script>
(async function() {
    'use strict';

    // ── Auth ──
    Auth.onAuthChange = (user) => {
        renderNav(user);
        if (!user) {
            window.location.href = '/';
            return;
        }
        loadEvents();
    };
    await Auth.init();

    function renderNav(user) {
        const nav = document.getElementById('navbar-actions');
        if (!user) {
            nav.innerHTML = '';
            return;
        }
        const roles = user.roles || [];
        const isAdmin = roles.includes('admin') || roles.includes('super_admin');

        let links = '';
        if (isAdmin) {
            links += `<a href="/admin.html" class="nav-link">Admin</a>`;
        }
        links += `<a href="/my-events.html" class="nav-link active">My Events</a>`;

        nav.innerHTML = `
            ${links}
            <button class="nav-btn nav-btn-ghost" onclick="Auth.logout().then(() => window.location.href = '/')">Log Out</button>
        `;
    }

    // ── Load Events ──
    async function loadEvents() {
        const container = document.getElementById('event-list');

        try {
            // Fetch all three sources in parallel
            const [regRes, memberRes, ownedRes] = await Promise.all([
                fetch('/api/registrations/my', { credentials: 'include' }),
                fetch('/api/my/tournaments', { credentials: 'include' }),
                fetch('/api/tournaments/director/mine', { credentials: 'include' }),
            ]);

            const registrations = regRes.ok ? (await regRes.json()).registrations || [] : [];
            const memberships = memberRes.ok ? (await memberRes.json()).memberships || [] : [];
            const ownedTournaments = ownedRes.ok ? (await ownedRes.json()).tournaments || [] : [];

            // Normalize into unified event items
            const items = [];

            // Competitor/parent registrations
            for (const reg of registrations) {
                items.push({
                    tournamentId: reg.tournament_id,
                    tournamentName: reg.tournament_name || reg.tournamentName || 'Unknown Tournament',
                    tournamentDate: reg.tournament_date || reg.tournamentDate || reg.date,
                    tournamentLocation: reg.tournament_location || reg.location || '',
                    tournamentSlug: reg.tournament_slug || reg.slug || '',
                    role: 'competitor',
                    status: reg.status || 'active',
                    appliedAt: reg.created_at || reg.createdAt,
                    events: reg.events || [],
                    memberId: null,
                    profileName: `${reg.profile_first_name || reg.first_name || ''} ${reg.profile_last_name || reg.last_name || ''}`.trim(),
                });
            }

            // Tournament memberships (coach/judge/staff/parent)
            for (const m of memberships) {
                items.push({
                    tournamentId: m.tournament_id,
                    tournamentName: m.tournament_name,
                    tournamentDate: m.tournament_date,
                    tournamentLocation: m.tournament_location || '',
                    tournamentSlug: m.tournament_slug || '',
                    role: m.role,
                    staffRole: m.staff_role,
                    status: m.status,
                    appliedAt: m.applied_at,
                    memberId: m.id,
                });
            }

            // Owned tournaments (director)
            for (const t of ownedTournaments) {
                items.push({
                    tournamentId: t.id,
                    tournamentName: t.name,
                    tournamentDate: t.date,
                    tournamentLocation: t.location || '',
                    tournamentSlug: t.slug || '',
                    role: 'director',
                    status: t.status || 'active',
                    competitorCount: t.competitor_count || 0,
                });
            }

            // Sort by date (newest first)
            items.sort((a, b) => {
                const da = a.tournamentDate || '';
                const db = b.tournamentDate || '';
                return db.localeCompare(da);
            });

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🥋</div>
                        <div class="empty-state-title">No events yet</div>
                        <div class="empty-state-text">
                            Browse <a href="/">upcoming tournaments</a> to register as a competitor, coach, judge, or staff member.
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => renderEventCard(item)).join('');

        } catch (err) {
            console.error('Failed to load events:', err);
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <div class="empty-state-title">Failed to load events</div>
                    <div class="empty-state-text">Please try refreshing the page.</div>
                </div>
            `;
        }
    }

    // ── Render Card ──
    function renderEventCard(item) {
        const dateStr = formatDate(item.tournamentDate);
        const roleLabel = getRoleLabel(item.role);
        const statusLabel = getStatusLabel(item.status);
        const roleBadge = `<span class="badge badge-${item.role}">${roleLabel}</span>`;
        const statusBadge = `<span class="badge badge-${item.status}">${statusLabel}</span>`;

        let staffBadge = '';
        if (item.staffRole) {
            staffBadge = `<span class="badge badge-staff" style="opacity:0.7">${esc(item.staffRole)}</span>`;
        }

        let details = '';
        if (item.role === 'competitor' && item.profileName) {
            details = `<span>${esc(item.profileName)}</span>`;
        }
        if (item.role === 'director' && item.competitorCount !== undefined) {
            details = `<span>${item.competitorCount} competitor${item.competitorCount !== 1 ? 's' : ''}</span>`;
        }

        // Event list for competitor registrations
        let eventsList = '';
        if (item.events && item.events.length > 0) {
            const evts = typeof item.events === 'string' ? JSON.parse(item.events) : item.events;
            if (Array.isArray(evts) && evts.length > 0) {
                const evtNames = evts.map(e => typeof e === 'string' ? e : (e.event_name || e.name || '')).filter(Boolean);
                if (evtNames.length > 0) {
                    eventsList = `<div style="margin-top:8px;font-size:12px;color:var(--text-dim);">${evtNames.map(n => esc(n)).join(' · ')}</div>`;
                }
            }
        }

        // Actions
        let actions = '';
        if (item.role === 'director') {
            actions = `
                <div class="event-card-actions">
                    <a href="/director/tournaments/${item.tournamentId}/manage" class="btn-sm btn-accent" style="text-decoration:none;">Manage</a>
                </div>
            `;
        } else if (item.memberId && item.status === 'approved' && ['coach', 'judge', 'staff'].includes(item.role)) {
            actions = `
                <div class="event-card-actions">
                    <button class="btn-sm btn-accent" onclick="window.open('/badge.html?memberId=${item.memberId}', '_blank')">Print Badge</button>
                </div>
            `;
        }

        const viewLink = item.tournamentSlug
            ? `<a href="/tournaments/${esc(item.tournamentSlug)}" class="btn-sm" style="text-decoration:none;">View Tournament</a>`
            : '';

        return `
            <div class="event-card">
                <div class="event-card-header">
                    <div class="event-card-info">
                        <div class="event-card-name">${esc(item.tournamentName)}</div>
                        <div class="event-card-meta">
                            ${dateStr ? `<span>${dateStr}</span>` : ''}
                            ${item.tournamentLocation ? `<span>${esc(item.tournamentLocation)}</span>` : ''}
                            ${details}
                        </div>
                        ${eventsList}
                    </div>
                    <div class="event-card-badges">
                        ${roleBadge}
                        ${staffBadge}
                        ${statusBadge}
                    </div>
                </div>
                ${actions || viewLink ? `<div class="event-card-actions">${viewLink}${actions}
                    <button class="btn-sm" onclick="toggleDetails('${item.tournamentId}', this)" style="margin-left:auto;">Details</button>
                </div>` : `<div class="event-card-actions">
                    <button class="btn-sm" onclick="toggleDetails('${item.tournamentId}', this)">Details</button>
                </div>`}
                <div class="details-panel" id="details-${item.tournamentId}" style="display:none;margin-top:12px;border-top:1px solid var(--border,#333);padding-top:12px;">
                    <div class="details-loading" style="color:var(--text-muted);font-size:13px;">Loading details...</div>
                </div>
            </div>
        `;
    }

    // ── Helpers ──
    function formatDate(dateStr) {
        if (!dateStr) return '';
        try {
            const d = new Date(dateStr.length === 10 ? dateStr + 'T12:00:00' : dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        } catch { return dateStr; }
    }

    function getRoleLabel(role) {
        const labels = {
            competitor: 'Competitor', coach: 'Coach', judge: 'Judge',
            staff: 'Staff', parent: 'Parent', director: 'Director',
        };
        return labels[role] || role;
    }

    function getStatusLabel(status) {
        const labels = {
            pending: 'Pending', approved: 'Approved', declined: 'Declined',
            active: 'Active', confirmed: 'Confirmed', cancelled: 'Cancelled',
        };
        return labels[status] || status;
    }

    function esc(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ── Tournament Details Drill-Down ──
    const detailsLoaded = {};

    window.toggleDetails = async function(tournamentId, btn) {
        const panel = document.getElementById('details-' + tournamentId);
        if (!panel) return;

        const isOpen = panel.style.display !== 'none';
        panel.style.display = isOpen ? 'none' : '';
        btn.textContent = isOpen ? 'Details' : 'Hide Details';

        if (!isOpen && !detailsLoaded[tournamentId]) {
            detailsLoaded[tournamentId] = true;
            await loadTournamentDetails(tournamentId, panel);
        }
    };

    async function loadTournamentDetails(tournamentId, panel) {
        try {
            // Fetch results and competitor list in parallel
            const [resultsRes, competitorsRes] = await Promise.all([
                fetch(`/api/tournaments/${tournamentId}/results/public`).catch(() => null),
                fetch(`/api/tournaments/${tournamentId}/competitors/public`).catch(() => null),
            ]);

            let html = '';

            // Results section
            if (resultsRes && resultsRes.ok) {
                const data = await resultsRes.json();
                const results = data.results || [];
                if (results.length) {
                    const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
                    html += '<div style="margin-bottom:12px;"><strong style="font-size:14px;">Results</strong>';
                    for (const r of results) {
                        const placements = Array.isArray(r.results_data) ? r.results_data : [];
                        const pHtml = placements.slice(0, 3).map((p, i) =>
                            `<span style="margin-right:12px;">${medals[i] || ''} ${esc(p.name || 'TBD')}</span>`
                        ).join('');
                        html += `<div style="font-size:13px;margin:4px 0;"><span style="color:var(--text-muted);">${esc(r.division_name)}:</span> ${pHtml}</div>`;
                    }
                    html += '</div>';
                }
            }

            // Competitors section
            if (competitorsRes && competitorsRes.ok) {
                const data = await competitorsRes.json();
                const comps = data.competitors || [];
                if (comps.length && !data.hidden) {
                    html += `<div><strong style="font-size:14px;">Registered Competitors</strong>
                        <span style="color:var(--text-muted);font-size:12px;margin-left:8px;">(${comps.length})</span>`;
                    const showMax = 10;
                    for (const c of comps.slice(0, showMax)) {
                        html += `<div style="font-size:13px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);">${esc(c.first_name)} ${esc(c.last_name)}${c.academy_name ? ` <span style="color:var(--text-muted);">(${esc(c.academy_name)})</span>` : ''}</div>`;
                    }
                    if (comps.length > showMax) {
                        html += `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">... and ${comps.length - showMax} more</div>`;
                    }
                    html += '</div>';
                }
            }

            panel.innerHTML = html || '<div style="color:var(--text-muted);font-size:13px;">No additional details available yet.</div>';
        } catch (err) {
            panel.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">Unable to load details.</div>';
        }
    }

})();
</script>
</body>
</html>
