<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard — Taikai</title>
    <style>
        /* ─── Reset & Variables ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f14;
            --bg-secondary: #1a1a24;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --text-dim: rgba(255,255,255,0.35);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.08);
            --glass-hover: rgba(255,255,255,0.1);
            --radius: 14px;
            --radius-sm: 10px;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a855f7;
            --yellow: #eab308;
            --pink: #ec4899;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }

        /* ─── Navbar ─── */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(15,15,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand { font-size: 22px; font-weight: 800; letter-spacing: 3px; color: var(--accent); }
        .navbar-actions { display: flex; align-items: center; gap: 12px; }
        .nav-link {
            color: var(--text-muted); font-size: 14px; font-weight: 500;
            padding: 8px 14px; border-radius: 8px; transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text); background: var(--glass); }
        .nav-link.active { color: var(--text); background: var(--glass); }
        .nav-btn {
            padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s;
        }
        .nav-btn-ghost { background: transparent; color: var(--text-muted); }
        .nav-btn-ghost:hover { color: var(--text); background: var(--glass); }

        /* ─── Page Content ─── */
        .page { padding: 96px 32px 48px; max-width: 900px; margin: 0 auto; }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

        /* ─── Loading / Empty ─── */
        .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--glass-border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center; padding: 60px 20px;
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: var(--radius); color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .empty-state-text { font-size: 14px; line-height: 1.6; }
        .empty-state a { color: var(--accent); text-decoration: underline; }

        /* ─── Tournament Cards ─── */
        .tournament-list { display: flex; flex-direction: column; gap: 16px; }
        .tournament-card {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 24px;
            transition: all 0.2s;
        }
        .tournament-card:hover { border-color: rgba(255,255,255,0.15); }
        .tournament-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
        .tournament-card-info { flex: 1; min-width: 200px; }
        .tournament-card-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .tournament-card-meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }

        /* ─── Competitor List ─── */
        .competitors-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--glass-border); }
        .competitors-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px; }
        .competitor-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; border-radius: var(--radius-sm);
            background: var(--glass); margin-bottom: 6px;
            font-size: 14px;
        }
        .competitor-row-name { font-weight: 500; }
        .competitor-row-badges { display: flex; gap: 6px; align-items: center; }
        .no-competitors { font-size: 13px; color: var(--text-dim); padding: 8px 0; }

        /* ─── Badges ─── */
        .badge {
            display: inline-flex; align-items: center; padding: 3px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .badge-coach { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .badge-signed { background: rgba(34,197,94,0.15); color: #4ade80; }

        /* ─── Buttons ─── */
        .btn-accent {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.15s;
            background: var(--accent); color: #fff;
        }
        .btn-accent:hover { background: var(--accent-hover); box-shadow: 0 4px 20px rgba(220,38,38,0.25); }
        .btn-sm {
            padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.15s;
            background: var(--glass); color: var(--text-muted);
        }
        .btn-sm:hover { background: var(--glass-hover); color: var(--text); }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .navbar { padding: 0 16px; }
            .page { padding: 80px 16px 32px; }
            .tournament-card { padding: 16px; }
            .tournament-card-header { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/" class="navbar-brand">TAIKAI</a>
    <div class="navbar-actions" id="navbar-actions"></div>
</nav>

<!-- Page -->
<main class="page">
    <h1 class="page-title">Coach Dashboard</h1>
    <p class="page-subtitle">Your approved tournaments and registered competitors.</p>
    <div id="tournament-list" class="tournament-list">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading your tournaments...</div>
        </div>
    </div>
</main>

<script src="/auth.js"></script>
<script>
(async function() {
    'use strict';

    // ── Auth ──
    Auth.onAuthChange = (user) => {
        renderNav(user);
        if (!user) {
            window.location.href = '/';
            return;
        }
        loadDashboard();
    };
    await Auth.init();

    function renderNav(user) {
        const nav = document.getElementById('navbar-actions');
        if (!user) { nav.innerHTML = ''; return; }
        const roles = user.roles || [];
        const isDirector = roles.includes('event_director');
        const isAdmin = roles.includes('admin') || roles.includes('super_admin');

        let links = '';
        if (isAdmin) {
            links += `<a href="/index.html" class="nav-link">Admin</a>`;
        } else if (isDirector) {
            links += `<a href="/director.html" class="nav-link">Dashboard</a>`;
        }
        links += `<a href="/my-events.html" class="nav-link">My Events</a>`;
        links += `<a href="/coach.html" class="nav-link active">Coach</a>`;
        nav.innerHTML = `
            ${links}
            <button class="nav-btn nav-btn-ghost" onclick="Auth.logout().then(() => window.location.href = '/')">Log Out</button>
        `;
    }

    // ── Helpers ──
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function formatDate(d) {
        if (!d) return '';
        const dt = new Date(typeof d === 'string' && d.length === 10 ? d + 'T12:00:00' : d);
        return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    async function api(url) {
        const res = await fetch(url, { credentials: 'include' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || data.error || `Request failed (${res.status})`);
        return data;
    }

    // ── Load Dashboard ──
    async function loadDashboard() {
        const container = document.getElementById('tournament-list');

        try {
            // Fetch memberships and waivers in parallel
            const [membershipsData, waiversData] = await Promise.all([
                api('/api/my/tournaments'),
                api('/api/waivers/coach/all'),
            ]);

            const memberships = (membershipsData.memberships || membershipsData || []);
            const waivers = (waiversData.waivers || []);

            // Filter to approved coach memberships only
            const coachTournaments = memberships.filter(
                m => m.role === 'coach' && m.status === 'approved'
            );

            if (coachTournaments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏅</div>
                        <div class="empty-state-title">No Approved Tournaments</div>
                        <div class="empty-state-text">
                            You haven't been approved as a coach for any tournaments yet.<br>
                            <a href="/">Browse tournaments</a> and apply as a coach to get started.
                        </div>
                    </div>`;
                return;
            }

            // Group waivers by tournament
            const waiversByTournament = {};
            for (const w of waivers) {
                const tid = w.tournament_id;
                if (!waiversByTournament[tid]) waiversByTournament[tid] = [];
                waiversByTournament[tid].push(w);
            }

            // Render tournament cards
            let html = '';
            for (const m of coachTournaments) {
                const tid = m.tournament_id;
                const tournamentWaivers = waiversByTournament[tid] || [];
                const pendingCount = tournamentWaivers.filter(w => w.status === 'pending').length;
                const signedCount = tournamentWaivers.filter(w => w.status === 'signed').length;

                html += `
                <div class="tournament-card">
                    <div class="tournament-card-header">
                        <div class="tournament-card-info">
                            <div class="tournament-card-name">${esc(m.tournament_name)}</div>
                            <div class="tournament-card-meta">
                                ${m.tournament_date ? `<span>${formatDate(m.tournament_date)}</span>` : ''}
                                ${m.tournament_location ? `<span>${esc(m.tournament_location)}</span>` : ''}
                            </div>
                        </div>
                        <span class="badge badge-coach">Approved Coach</span>
                    </div>

                    <div class="competitors-section">
                        <div class="competitors-title">
                            Registered Competitors (${tournamentWaivers.length})
                            ${pendingCount > 0 ? `<span style="margin-left:8px;" class="badge badge-pending">${pendingCount} waiver pending</span>` : ''}
                            ${signedCount > 0 ? `<span style="margin-left:4px;" class="badge badge-signed">${signedCount} signed</span>` : ''}
                        </div>
                        ${tournamentWaivers.length > 0
                            ? tournamentWaivers.map(w => `
                                <div class="competitor-row">
                                    <span class="competitor-row-name">${esc(w.competitor_name)}</span>
                                    <div class="competitor-row-badges">
                                        <span class="badge ${w.status === 'signed' ? 'badge-signed' : 'badge-pending'}">
                                            ${w.status === 'signed' ? 'Waiver Signed' : 'Waiver Pending'}
                                        </span>
                                    </div>
                                </div>`).join('')
                            : '<div class="no-competitors">No competitors registered yet.</div>'
                        }
                    </div>

                    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                        <a href="/register.html#dashboard?tournamentId=${tid}&role=coach" class="btn-accent">Register Competitors</a>
                        ${m.tournament_slug
                            ? `<a href="/tournaments/${m.tournament_slug}" class="btn-sm">View Tournament</a>`
                            : ''
                        }
                    </div>
                </div>`;
            }
            container.innerHTML = html;

        } catch (err) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <div class="empty-state-title">Error Loading Dashboard</div>
                    <div class="empty-state-text">${esc(err.message)}</div>
                </div>`;
        }
    }
})();
</script>
</body>
</html>
