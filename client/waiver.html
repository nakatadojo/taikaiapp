<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Waiver — Taikai</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f14;
            --bg-secondary: #1a1a24;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --text-dim: rgba(255,255,255,0.35);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.08);
            --green: #22c55e;
            --radius: 14px;
            --radius-sm: 10px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 560px;
            width: 100%;
        }

        /* ─── Brand ─── */
        .brand {
            text-align: center; margin-bottom: 32px;
        }
        .brand-name {
            font-size: 28px; font-weight: 800; letter-spacing: 3px; color: var(--accent);
        }

        /* ─── Card ─── */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 32px;
        }
        .card-icon {
            text-align: center; font-size: 48px; margin-bottom: 16px;
        }
        .card-title {
            font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px;
        }
        .card-subtitle {
            font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 24px; line-height: 1.6;
        }

        /* ─── Info Row ─── */
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; border-radius: var(--radius-sm);
            background: var(--glass); margin-bottom: 8px; font-size: 14px;
        }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; }

        /* ─── Waiver Text ─── */
        .waiver-text-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-muted);
        }

        /* ─── Form ─── */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            margin-bottom: 6px; color: var(--text-muted);
        }
        .form-input {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text); font-size: 14px;
            transition: border-color 0.2s; outline: none;
        }
        .form-input:focus { border-color: var(--accent); }

        .checkbox-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin: 20px 0; font-size: 14px; color: var(--text-muted);
        }
        .checkbox-row input[type="checkbox"] {
            margin-top: 2px; width: 18px; height: 18px;
            accent-color: var(--accent); cursor: pointer;
        }

        /* ─── Button ─── */
        .btn {
            display: block; width: 100%; padding: 14px;
            border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s;
            text-align: center;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 4px 20px rgba(220,38,38,0.25); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ─── States ─── */
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--glass-border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state { text-align: center; padding: 40px 0; color: var(--text-muted); }

        .success-icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(34,197,94,0.15);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 32px; color: var(--green);
        }

        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
            color: #f87171; padding: 12px 16px; border-radius: var(--radius-sm);
            font-size: 14px; margin-bottom: 16px; text-align: center;
        }

        .signed-date { font-size: 13px; color: var(--text-dim); text-align: center; margin-top: 8px; }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">
        <span class="brand-name">TAIKAI</span>
    </div>
    <div class="card" id="waiver-card">
        <div class="loading-state">
            <div class="spinner"></div>
            <div>Loading waiver...</div>
        </div>
    </div>
</div>

<script>
(async function() {
    'use strict';

    const card = document.getElementById('waiver-card');

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function formatDate(d) {
        if (!d) return '';
        const dt = new Date(typeof d === 'string' && d.length === 10 ? d + 'T12:00:00' : d);
        return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Get token from URL
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    if (!token) {
        card.innerHTML = `
            <div class="card-icon">⚠️</div>
            <div class="card-title">Invalid Link</div>
            <div class="card-subtitle">This waiver link is invalid or missing. Please use the link from your email.</div>
        `;
        return;
    }

    // Fetch waiver details
    try {
        const res = await fetch('/api/waivers/' + encodeURIComponent(token));
        const data = await res.json();

        if (!res.ok) {
            card.innerHTML = `
                <div class="card-icon">⚠️</div>
                <div class="card-title">Waiver Not Found</div>
                <div class="card-subtitle">${esc(data.error || 'This waiver link is invalid or has expired.')}</div>
            `;
            return;
        }

        const waiver = data.waiver;

        // Already signed
        if (waiver.status === 'signed') {
            const signedDate = waiver.signedAt ? formatDate(waiver.signedAt) : '';
            card.innerHTML = `
                <div class="success-icon">&#10003;</div>
                <div class="card-title">Waiver Already Signed</div>
                <div class="card-subtitle">
                    The waiver for <strong>${esc(waiver.competitorName)}</strong> for
                    <strong>${esc(waiver.tournamentName)}</strong> has already been signed
                    ${waiver.parentName ? `by <strong>${esc(waiver.parentName)}</strong>` : ''}.
                </div>
                ${signedDate ? `<div class="signed-date">Signed on ${signedDate}</div>` : ''}
            `;
            return;
        }

        // Show sign form
        card.innerHTML = `
            <div class="card-icon">📋</div>
            <div class="card-title">Participation Waiver</div>
            <div class="card-subtitle">Please review and sign the waiver below to complete the tournament registration.</div>

            <div class="info-row">
                <span class="info-label">Competitor</span>
                <span class="info-value">${esc(waiver.competitorName)}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Tournament</span>
                <span class="info-value">${esc(waiver.tournamentName)}</span>
            </div>
            ${waiver.tournamentDate ? `
            <div class="info-row">
                <span class="info-label">Date</span>
                <span class="info-value">${formatDate(waiver.tournamentDate)}</span>
            </div>` : ''}

            <div class="waiver-text-box">${esc(waiver.waiverText).replace(/\n/g, '<br>')}</div>

            <div id="sign-error" class="error-msg" style="display:none;"></div>

            <form id="sign-form">
                <div class="form-group">
                    <label for="parent-name">Parent/Guardian Full Name *</label>
                    <input type="text" id="parent-name" class="form-input" required placeholder="Your full name" autocomplete="name">
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="agree-check" required>
                    <label for="agree-check" style="cursor:pointer;">I have read and agree to the terms of this waiver. I am the parent or legal guardian of the competitor named above.</label>
                </div>

                <button type="submit" class="btn btn-accent" id="sign-btn">Sign Waiver</button>
            </form>
        `;

        // Handle form submission
        document.getElementById('sign-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('sign-btn');
            const errorEl = document.getElementById('sign-error');
            errorEl.style.display = 'none';

            const parentName = document.getElementById('parent-name').value.trim();
            const agree = document.getElementById('agree-check').checked;

            if (!parentName) {
                errorEl.textContent = 'Please enter your full name.';
                errorEl.style.display = 'block';
                return;
            }
            if (!agree) {
                errorEl.textContent = 'You must agree to the waiver terms.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing...';

            try {
                const signRes = await fetch('/api/waivers/' + encodeURIComponent(token) + '/sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parentName, agree: true }),
                });
                const signData = await signRes.json();

                if (!signRes.ok) {
                    errorEl.textContent = signData.error || 'Failed to sign waiver. Please try again.';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign Waiver';
                    return;
                }

                // Success
                card.innerHTML = `
                    <div class="success-icon">&#10003;</div>
                    <div class="card-title">Waiver Signed!</div>
                    <div class="card-subtitle">
                        Thank you, <strong>${esc(parentName)}</strong>. The waiver for
                        <strong>${esc(waiver.competitorName)}</strong> has been signed successfully.
                        The coach has been notified.
                    </div>
                `;
            } catch (err) {
                errorEl.textContent = 'An error occurred. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign Waiver';
            }
        });

    } catch (err) {
        card.innerHTML = `
            <div class="card-icon">⚠️</div>
            <div class="card-title">Error</div>
            <div class="card-subtitle">Failed to load waiver. Please try again later.</div>
        `;
    }
})();
</script>
</body>
</html>
